######################
# Defaults
######################

defaults:
  - _self_
  # Image editor model (e.g., nanobanana-gemini, nanobanana-litellm)
  - editor: nanobanana-gemini
  # Strategy for processing images
  - strategy: random-sampling

######################
# General Settings
######################

general:
  # Directory containing the folders of images to process
  src_dir: ${hydra:runtime.cwd}/data/test
  # Destination directory for saving the processed images
  dst_dir: ${hydra:runtime.cwd}/../nudging/data
  # Output aspect ratio for edited images
  aspect_ratio: "1:1"
  # Maximum number of parallel workers for processing
  max_workers: 1

######################
# Dataset Settings
######################

dataset:
  # Name of the dataset (used for creating destination subfolder)
  name: test
  # Number of image folders to process (set to -1 to process all)
  num_folders: -1
  # Number of images to evaluate from each folder (set to -1 to evaluate all)
  num_evaluate_per_folder: -1
  # Number of images to finally select for processing from each folder (set to -1 to choose all)
  num_process_per_folder: -1

#######################
# Enhancement Settings
#######################

image_enhancer:
  # Hydra target class for image enhancement
  _target_: setup.enhance.ImageEnhancer
  # Model to be used for image enhancement
  enhancement_model: ${editor}
  # The prompt for enhancing the original images
  enhancement_prompt: |
    Upscale the image and enhance its quality.
    Do not make any other changes to the image itself.
    The subject is a {category}.

    Edit the image to standardize it with the following requirements:
    1. Remove the background and replace it with a plain white color (#FFFFFF).
    2. Isolate the main subject of the image.
    3. Apply neutral, even lighting to the subject.
    4. Scale and position the subject so it takes up approximately 60% of the image area.
    Do not alter the main subject's appearance beyond these standardization requirements.
