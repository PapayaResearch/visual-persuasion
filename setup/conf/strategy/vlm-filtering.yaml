# VLM Filtering Strategy Configuration
_target_: setup.strategy.VLMFiltering
num_folders: ${dataset.num_folders}
num_evaluate_per_folder: ${dataset.num_evaluate_per_folder}
num_process_per_folder: ${dataset.num_process_per_folder}
evaluator_prompt: |
  Select the best image from the provided images.
evaluator_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: |
    Your task is to help select the most appealing image from a given set.
    Return only the index (1-based) of the selected image.
  input_schema:
    _target_: setup.schema.create_evaluator_input_schema
    task_description: |
      The image selection task description
    images_description: |
      List of image bytes: [image_1, image_2, ..., image_N]
  output_schema:
    _target_: setup.schema.create_evaluator_output_schema
    choice_description: |
      Which image is the most appealing: '1', '2', ..., 'N'
  api_call: ${llm}
