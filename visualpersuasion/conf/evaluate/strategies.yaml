_target_: visualpersuasion.evaluation.strategies.StrategiesComparison

# Evaluation type name
name: strategies

# Task names to evaluate
task_names: [hotels, houses, people, products]

# Input directory containing strategy subdirectories with optimization results
data_dir: ${general.data_dir}

# Output directory where comparison results will be saved (in model/timestamp subdirs)
results_dir: results-cross-strategies/

# Maximum number of comparisons to evaluate (random sample if exceeded, -1 for all)
max_comparisons: -1

# Random seed for sampling (for reproducibility)
sampling_seed: 42

# Evaluator configuration (will be instantiated per task with task-specific system prompts)
evaluator_config:
  input_schema:
    _target_: visualpersuasion.schema.create_evaluator_without_prompt_input_schema
    images_description: |
      List of image bytes: [first, second]
    metadata_description: |
      Additional context about the images (e.g. product category, task type)
  output_schema:
    _target_: visualpersuasion.schema.create_evaluator_output_schema
    choice_description: |
      Your choice: 'first' or 'second'
    choice_options: ['first', 'second']
    reason_description: |
      Concise justification of your decision (1-3 sentences).
  api_call: ${llm}
