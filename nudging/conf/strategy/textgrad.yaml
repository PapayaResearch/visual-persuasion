_target_: nudging.textgrad.TextGradBaseline

# Strategy name for logging/results organization
name: textgrad

# Number of optimization iterations per image
max_iterations: 10

# Gradient memory for TGD optimizer (0 = no memory)
gradient_memory: 0

# Use default image editor from config
image_editing_model: ${editor}

# TextGrad engine name
textgrad_engine: ${llm.model}

# Base prior prompt for all image edits
base_prior: ${task.optimization.base_prior}

# System prompt for TextGrad loss evaluations
loss_system_prompt: ${task.optimization.textgrad_loss_system_prompt}

# Context prompt for TextGrad loss evaluations
loss_context_prompt: ${task.optimization.textgrad_loss_context_prompt}

# Natural language constraints for the optimizer
constraints: ${task.optimization.textgrad_constraints}
