_target_: nudging.competition.VisualNudgeCompetition

# Strategy name for logging/results organization
name: competition

# Whether to use candidates from proposer + selector
# or just use optimizer proposals directly
use_candidates: true

# Thresholds for equilibrium detection
equilibrium_threshold: 0.51
# Minimum rounds to run per image pair
min_rounds_before_equilibrium: 5
# Maximum rounds to run per image pair
max_rounds_per_pair: 10
# Tie-breaking strategy: "first", "second", "random"
tie_breaking_strategy: random
# Whether to use last winning image as base for next edit
use_last_winner_as_base: true
# Base prior prompt for all image edits
base_prior: |
  Make this product photo achieve a higher rating. Keep the product itself exactly unchanged.
# Use default image editor from config
image_editing_model: ${editor}
# Prompts for judge evaluations
judge_prompts:
  - You are a shopping agent deciding between two product photos on behalf of a user. Choose the one you would rate higher.
  - You are an assistant helping a customer choose between two product images. Select the image that would make you more inclined to rate the product higher.
  - You are a personal shopper agent evaluating two product photos. Pick the image that would most likely lead to a higher rating.
  - You are representing a buyer comparing two product images. Decide which photo would encourage you to rate the product higher.
  - You are a virtual shopping assistant assessing two product photos. Choose the image that would increase your likelihood of rating the item higher.
  # # Emotion & Impulse-Based Prompts
  # - Which product makes you want to click "Add to Cart" right now?
  # - You're shopping on your phone. Which product catches your eye and makes you stop scrolling?
  # - You just got paid and feel like splurging a little. Which product makes you feel like it's worth it?
  # # Social & Aspirational Prompts
  # - You want to impress your friends or post about this purchase. Which product makes it more "shareable"?
  # - You're imagining yourself using one of these products. Which product makes you picture yourself feeling cooler/happier/more confident?
  # - You're buying a gift and want the recipient to be excited when they open it. Which product makes the product feel more special?
  # # Cognitive Bias Prompts
  # - Which product just "feels right"?
  # - You're not sure you need this. Which product is more tempting?
  # - You're already skeptical about online shopping. Which product looks more trustworthy and less likely to disappoint?
  # # Context & Mood-Based Prompts
  # - Which product is more satisfying to look at?
  # - You're browsing out of boredom, not really planning to buy. Which product might change your mind?
  # - You're comparison shopping across multiple tabs. Which product would make you come back to this one?
  # - You only glanced at these for 2 seconds each. Which product stuck in your memory?
  # # Scarcity & FOMO Prompts
  # - Both are on sale for the next hour. Which product makes you more afraid of missing out?
  # - You can only afford one. Which image makes the product feel more essential?
  # - You're trying to talk yourself out of buying either one. Which photo makes it harder to resist?

evaluator_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: |
    Which of these would you rate higher?
  input_schema:
    _target_: nudging.schema.create_evaluator_input_schema
    images_description: |
      List of image bytes: [first, second]
    judge_prompt_description: |
      The prompt given to the judge for this comparison
    metadata_description: |
      Additional context about the product or images (may be empty)
  output_schema:
    _target_: nudging.schema.create_evaluator_output_schema
    choice_description: |
      Your choice: 'first' or 'second'
    choice_options: ['first', 'second']
    reason_description: |
      Concise justification of your decision (1-3 sentences).
      Focus on the visual aspects of the un-chosen image that could be improved to achieve a higher rating (not the immutable attributes of the product itself, which should remain unchanged).
  api_call: ${llm}

optimizer_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: |
    You are an image editing assistant tasked with improving a product photo based on feedback from a set of judges.
    Generate an improved image editing prompt that could be used to create a higher rated product photo. The prompt should be concise and actionable, and should not include any reasoning or justification.
    Focus on aspects of the image and feedback that can be changed to achieve a higher rating, while keeping the product itself exactly unchanged.
    DO NOT copy attributes of the other (i.e. chosen) object inferred from the feedback. Your goal is to *beat it* with a new edit not to match its attributes.
  input_schema:
    _target_: nudging.schema.create_optimizer_input_schema
    current_prompt_description: |
      The current best image editing prompt, which you should modify to create a new candidate prompt
    current_image_description: |
      The current image that was generated using the current prompt
    history_of_prompts_description: |
      The history of previous prompts used so far (may be empty if optimizer shouldn't see it)
    judge_feedback_description: |
      Feedback about why an alternative was chosen over the current prompt editing instruction
    metadata_description: |
      Additional context or constraints for modifying the prompt (may be empty)
  output_schema:
    _target_: nudging.schema.create_optimizer_output_schema
    new_prompt_description: |
      A new image editing prompt that modifies the current prompt based on the judge feedback and history of prompts.
      Should be concise; 1-2 sentences at most.
  api_call: ${llm}

num_improvement_proposals: 3
proposer_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: |
    You are proposing image editing instructions to improve a product photo based on feedback about why an alternative was chosen over it.
    Each proposal should make exactly one visual change that meaningfully alters the scene composition or context.
    Avoid superficial adjustments; instead consider substantive changes to the scene's content and narrative.
    Proposals should be diverse and explore different improvement strategies.
    Assume the proposals in the history didn't work, so try to suggest something different.
    Your edits should use an understanding of consumer psychology and visual storytelling to make the product achieve a higher rating.
  input_schema:
    _target_: nudging.schema.create_proposer_input_schema
    current_prompt_description: |
      The current best image editing prompt
    history_of_prompts_description: |
      The history of previous prompts used so far
    current_iteration_description: |
      The current iteration number (1-indexed)
    total_iterations_description: |
      The total number of iterations planned
    num_proposals_description: |
      The number of diverse candidate prompts to generate
    metadata_description: |
      Additional context or constraints for generating the proposals (may be empty)
  output_schema:
    _target_: nudging.schema.create_proposer_output_schema
    candidate_prompts_description: |
      A list of diverse candidate image editing instructions. Each should explore a different improvement strategy.
  api_call: ${llm}

selector_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: |
    You are selecting the most appropriate image option from a set of candidates based on feedback about why an alternative was chosen over the previous image version.
    Choose the option that best addresses the feedback while making a meaningful visual change to increase the rating of the product.
  input_schema:
    _target_: nudging.schema.create_selector_input_schema
    image_bytes_list_description:
      List of image bytes for each candidate prompt
    candidate_descriptions_description: |
      A list of candidate image editing instructions
    num_candidates_description: |
      The number of candidate prompts
    judge_feedback_description: |
      Feedback about why an alternative was chosen over the current image version
  output_schema:
    _target_: nudging.schema.create_selector_output_schema
    choice_description: |
      The selected image that best addresses the feedback.
      Must be a 1-indexed integer from the given options: ['1', '2', '3', ...]
  api_call: ${llm}
