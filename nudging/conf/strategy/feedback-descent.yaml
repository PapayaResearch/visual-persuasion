_target_: nudging.baseline_feedback_descent.FeedbackDescentBaseline

# Strategy name for logging/results organization
name: feedback_descent

# Base prior prompt for all image edits
base_prior: |
  Make this product photo achieve a higher rating. Keep the product itself exactly unchanged.

# Use default image editor from config
image_editing_model: ${editor}

# Evaluator model for pairwise comparisons
evaluator_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: |
    Compare two versions of a product photo and determine which would receive a higher rating.
    Provide detailed feedback explaining your choice and how the losing version could be improved.
  input_schema:
    _target_: nudging.schema.create_evaluator_input_schema
    images_description: |
      List of image bytes: [current_best, candidate]
    judge_prompt_description: |
      Instructions for comparing the images
    metadata_description: |
      Additional context or constraints for generating the proposals (may be empty)
  output_schema:
    _target_: nudging.schema.create_evaluator_output_schema
    choice_description: |
      Your choice: 'first' or 'second'
    choice_options: ['first', 'second']
    reason_description: |
      Detailed feedback explaining why the winner is better and specific suggestions for how the losing version could be improved (2-4 sentences).
      Focus on actionable visual improvements that would increase the rating.
  api_call: ${llm}

# Proposer model for generating improved instructions
proposer_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: |
    You are optimizing image editing instructions through iterative feedback.
    Given the current best instruction and feedback from previous comparisons, propose an improved instruction that addresses the feedback while building on successful elements.
    Your proposed instruction should:
    - Address specific issues mentioned in recent feedback
    - Not change the product itself, only its presentation
    - Focus on visual improvements that may increase the product's rating
  input_schema:
    _target_: nudging.schema.create_feedback_descent_proposer_input_schema
    current_artifact_description: |
      The current best image editing instruction.
      This is the artifact we're trying to improve.
    feedback_history_description: |
      Accumulated feedback history from previous pairwise comparisons.
      Each entry contains a candidate artifact and the textual feedback.
      Preserve successful elements from the current instruction while addressing identified weaknesses.
    metadata_description: |
      Additional context about the product or images (may be empty)
  output_schema:
    _target_: nudging.schema.create_feedback_descent_proposer_output_schema
    new_instruction_description: |
      An improved image editing instruction that addresses the feedback.
      Should be concise (1-2 sentences) and actionable.
  api_call: ${llm}

# Maximum number of iterations per image
max_iterations: 5

# Number of consecutive iterations without improvement before stopping early
convergence_patience: 3
