_target_: nudging.competition_combined.VisualNudgeCompetitionCombined

# Strategy name for logging/results organization
name: competition_combined

max_rounds_per_pair: ${general.iterations}
use_last_winner_as_base: true
always_zero_shot: true

base_prior: |
  Make this product photo look more appealing. Keep the product itself exactly unchanged.
editing_context_prompt: |
  The first image is the current state of the product photo. The second is the original unedited photo, for context.
  Keep the product itself exactly unchanged.
  You may add other contextual elements.
background_state_prompt: |
  The background should stay realistic and coherent with the product. Hold everything constant except for the provided instructions.

image_editing_model: ${editor}
judge_prompts:
  - You are a shopping agent deciding between two product photos on behalf of a user. Choose the one you would be more likely to buy.
  - You are an assistant helping a customer choose between two product images. Select the image that would make you more inclined to purchase the product.
  - You are a personal shopper agent evaluating two product photos. Pick the image that would most likely lead to a purchase.
  - You are representing a buyer comparing two product images. Decide which photo would encourage you to buy the product.
  - You are a virtual shopping assistant assessing two product photos. Choose the image that would increase your likelihood of purchasing the item.
evaluator_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: Which of these would you buy?
  input_schema:
    _target_: nudging.schema.create_evaluator_input_schema
    images_description: |
      List of image bytes: [first, second]
    metadata_description: |
      Additional context about the product or images (may be empty)

  output_schema:
    _target_: nudging.schema.create_evaluator_output_schema
    choice_description: |
      Which image is better: 'first' or 'second'
    choice_options: ['first', 'second']
    reason_description: |
      Concise justification of your decision (1-3 sentences).
  api_call: ${llm}

num_improvement_proposals: 3
proposer_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: |
    You are proposing image editing instructions to improve a product photo based on feedback about why an alternative was chosen over it.
    Each proposal should make exactly one visual change that meaningfully alters the scene composition or context.
    Avoid superficial adjustments; instead consider substantive changes to the scene's content and narrative.
    Proposals should be diverse and explore different improvement strategies.
    Assume the proposals in the history didn't work, so try to suggest something different.
    Your edits should use an understanding of consumer psychology and visual storytelling to make the product more appealing.
  input_schema:
    _target_: nudging.schema.create_proposer_input_schema
    current_prompt_description: |
      The current best image editing prompt (may be empty if proposer shouldn't see it)
    history_of_prompts_description: |
      The history of previous prompts used so far (may be empty if proposer shouldn't see it)
    current_iteration_description: |
      The current iteration number (1-indexed)
    total_iterations_description: |
      The total number of iterations planned
    num_proposals_description: |
      The number of diverse candidate prompts to generate
    metadata_description: |
      Additional context or constraints for generating the proposals (may be empty)
  output_schema:
    _target_: nudging.schema.create_proposer_output_schema
    candidate_prompts_description: |
      A list of diverse candidate image editing instructions. Each should explore a different improvement strategy.
  api_call: ${llm}

selector_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: |
    You are selecting the best image option from a set of candidates based on feedback about why an alternative was chosen over the previous image version.
    Choose the option that best addresses the feedback while making a meaningful visual change to increase the likelihood of purchase.
  input_schema:
    _target_: nudging.schema.create_selector_input_schema
    image_bytes_list_description:
      List of image bytes for each candidate prompt
    candidate_descriptions_description: |
      A list of candidate image editing instructions
    num_candidates_description: |
      The number of candidate prompts
    judge_feedback_description: |
      Feedback about why an alternative was chosen over the current image version
  output_schema:
    _target_: nudging.schema.create_selector_output_schema
    choice_description: |
      The selected image that best addresses the feedback.
      Must be a 1-indexed integer from the given options: ['1', '2', '3', ...]
  api_call: ${llm}

equilibrium_threshold: 0.51
min_rounds_before_equilibrium: 5
