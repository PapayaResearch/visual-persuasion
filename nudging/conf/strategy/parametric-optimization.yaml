_target_: nudging.optimization.OptimizationPipeline

# Strategy name for logging/results organization
name: parametric-optimization

# Competition type: 'choice' (multi-judge voting) or 'score' (individual scoring)
competition_type: choice

# List of judge prompts for comparability assessment and choice-based competitions
comparability_prompts:
  - You are a shopping agent comparing two product photos. Which image would you give a higher rating?
  - You are an assistant helping a customer compare two product images. Which image would you rate more highly?
  - You are a personal shopper agent evaluating two product photos. Which image deserves a higher rating?
  - You are representing a buyer comparing two product images. Which image would you score higher?
  - You are a virtual shopping assistant assessing two product photos. Which image would you rate as superior?
# Prompt for score-based competitions
competition_prompt: |
  Rate the following product image from 0-100, where 0 means very low and 100 means very high.

# Threshold for considering images "comparable"
comparability_threshold: 0.6
# Regex pattern to extract category from filename
category_pattern: '^([^_]+)_'

# Competition settings
max_rounds_per_pair: ${general.iterations}
editing_context_prompt: |
  The first image is the current state of the product photo. The second is the original unedited photo, for context.
  Keep the product itself exactly unchanged.
  You may add other contextual elements.
initial_prompt: |
  Make this product photo look more appealing. Keep the product itself exactly unchanged.
background_state_prompt: |
  The background should stay realistic and coherent with the product. Hold everything constant except for the provided instructions.
image_editing_model: ${editor}

# Equilibrium detection settings
equilibrium_threshold: 0.51
min_rounds_before_equilibrium: 3

# Comparability evaluator model
comparability_evaluator_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: |
    You are comparing two product images to determine which one rates higher on a specific attribute.
    Be objective and consistent in your evaluations.
  input_schema:
    _target_: nudging.schema.create_evaluator_input_schema
    images_description: |
      List of image bytes: [first, second]
    judge_prompt_description: |
      The prompt given to the judge for this comparison
  output_schema:
    _target_: nudging.schema.create_evaluator_output_schema
    choice_description: |
      Which image is better: 'first' or 'second'
    choice_options: ['first', 'second']
    reason_description: |
      Concise justification of your decision (1-3 sentences).
  api_call: ${llm}

# Score-based evaluator model for competition
evaluator_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: |
    You are evaluating a product image on a specific attribute.
    Provide a score from 0-100 based on how well the image represents the attribute.
    Be objective and consistent in your evaluations.
  input_schema:
    _target_: nudging.schema.create_score_input_schema
    image_description: |
      The product image to evaluate
    judge_prompt_description: |
      The prompt specifying which attribute to evaluate
  output_schema:
    _target_: nudging.schema.create_score_output_schema
    score_description: |
      Score for the image (1-100) on the specified attribute
    reason_description: |
      Concise justification of the score (1-3 sentences)
  api_call: ${llm}

# Optimizer for improving losers
num_improvement_proposals: 3

proposer_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: |
    You are proposing image editing instructions to improve a product photo's perceived value on a specific attribute.
    Each proposal should make exactly one visual change that meaningfully alters the scene composition or context.
    Avoid superficial adjustments; instead consider substantive changes to the scene's content and narrative.
    Proposals should be diverse and explore different improvement strategies.
  input_schema:
    _target_: nudging.schema.create_proposer_input_schema
    current_prompt_description: |
      The current best image editing prompt (may be empty if proposer shouldn't see it)
    history_of_prompts_description: |
      The history of previous prompts used so far (may be empty if proposer shouldn't see it)
    current_iteration_description: |
      The current iteration number (1-indexed)
    total_iterations_description: |
      The total number of iterations planned
    num_proposals_description: |
      The number of diverse candidate prompts to generate
    metadata_description: |
      Additional context or constraints for generating the proposals (may be empty)
  output_schema:
    _target_: nudging.schema.create_proposer_output_schema
    candidate_prompts_description: |
      A list of diverse candidate image editing instructions. Each should explore a different improvement strategy.
  api_call: ${llm}

selector_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: |
    You are selecting the best image option from a set of candidates based on feedback about why an alternative was chosen over the previous image version.
    Choose the option that best addresses the feedback while making a meaningful visual change to increase the perceived value on the target attribute.
  input_schema:
    _target_: nudging.schema.create_selector_input_schema
    image_bytes_list_description:
      List of image bytes for each candidate prompt
    candidate_descriptions_description: |
      A list of candidate image editing instructions
    num_candidates_description: |
      The number of candidate prompts
    judge_feedback_description: |
      Feedback about why an alternative was chosen over the previous image version
  output_schema:
    _target_: nudging.schema.create_selector_output_schema
    choice_description: |
      The selected image that best addresses the feedback.
      Must be a 1-indexed integer from the given options: ['1', '2', '3', ...]
  api_call: ${llm}