_target_: nudging.zero_shot.ZeroShot

# Strategy name for logging/results organization
name: zero-shot

# Base prompt template with variable placeholder for substitution
# Use ${variable_name} syntax where variable_name matches prior_variable below
base_prompt: |
  ${prior}.
  Keep the product itself exactly unchanged, and the background neutral.
  You may add other contextual elements.

base_prior: |
  Make this product photo look more appealing

# Use the selected editor from the defaults section
image_editing_model: ${editor}

# Name of the template variable to substitute in base_prompt
prior_variable: prior

# List of priors to substitute into the template variable in base_prompt
# If empty list, base_prompt is used with template variable replaced by empty string
priors:
  - Make this product photo look more appealing by improving the lighting
  - Make this product photo look more appealing by changing the perspective
  - Make this product photo look more appealing by including people engaging with it
  - Make this product photo look more appealing by including pets in the context
  - Make this product photo look more appealing by including a professional badge of approval
  - Showcase this product photo on top of a surface
  - Partially zoom in or out this product photo
  - Make this product photo look less appealing by degrading the lighting
  - Make this product photo look less appealing by degrading the perspective (e.g. flat)
  - Make this product photo look less appealing by including a suspicious badge of approval
