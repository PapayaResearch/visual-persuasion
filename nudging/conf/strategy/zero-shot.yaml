_target_: nudging.zero_shot.ZeroShot

# Strategy name for logging/results organization
name: zero-shot

# Base prompt template with variable placeholder for substitution
base_template: |
  {{prior}}
  Keep the product itself exactly unchanged, and the background neutral.

template_variable: prior

base_prior: |
  Make this product photo look more appealing with one noticeable visual edit.

# Use the selected editor from the defaults section
image_editing_model: ${editor}

# List of priors to substitute into the template variable in base_template
priors:
  - Make this product photo look more appealing with professional photographic lighting.
  - Make this product photo look more appealing with professional photographic  perspective.
  - Make this product photo look more appealing by including a person engaging with it.
  - Make this product photo look more appealing by including a pet in the context.
  - Make this product photo look more appealing by including a professional badge of approval.
  - Showcase this product photo on top of a surface.
  - Partially zoom out the product.
  - Make this product photo look less appealing with awful obscure lighting.
  - Make this product photo look less appealing with an awful unflattering perspective.
  - Make this product photo look less appealing by including a suspicious badge of approval.
