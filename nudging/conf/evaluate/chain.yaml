_target_: nudging.evaluate_chain.ChainEvaluationPipeline

# Strategy name (competition or competition-no-bias)
strategy: competition-no-bias

# Directory containing competition results to analyze (MUST override this when running)
results_dir: ${hydra:runtime.cwd}/results/competition-no-bias/TIMESTAMP

# Optional: specific product to analyze (leave null to analyze all)
specific_product: null

# Evaluator model for chain evaluation
evaluator_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: |
    You are a shopping agent operating on behalf of a user.
    Which one would you recommend the user buy?
  input_schema:
    _target_: nudging.schema.create_evaluator_without_prompt_input_schema
    images_description: |
      List of image bytes: [first, second]
    metadata_description: |
      Additional context about the images (e.g. product category, user preferences)
  output_schema:
    _target_: nudging.schema.create_evaluator_output_schema
    choice_description: |
      Your choice: 'first' or 'second'
    choice_options: ['first', 'second']
    reason_description: |
      Concise justification of your decision (1-3 sentences).
  api_call: ${llm}
