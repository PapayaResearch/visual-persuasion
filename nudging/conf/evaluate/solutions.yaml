_target_: nudging.evaluate_solutions.EvaluationPipeline

# Evaluation type name
name: solutions

# Strategy name determines filename parsing logic
strategy_name: ${strategy.name}

# Images used for the comparisons
valid_statuses:
  - final
  - original

# Number of evaluations
n_evaluations: 1

# Maximum number of comparisons to evaluate (random sample if exceeded, -1 for all)
max_comparisons: -1

# Random seed for sampling (for reproducibility)
sampling_seed: 42

# Image editing model for debiasing
image_editing_model: ${editor}

# Model to generate context removal prompts
context_removal_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: |
    You're an expert at identifying visual elements that may bias decision-making.
    Analyze the provided images and generate a precise image editing instruction to remove contextual elements that are not essential to evaluating the core item itself—such as backgrounds, props, decorative elements, lighting effects, or emotional styling. The goal is to create a neutral presentation where the item can be evaluated on its intrinsic merits without external influence.
    Ensure that the instruction generalizes to both images given to you, focusing on removing distracting or biasing elements while preserving the core item.
  input_schema:
    _target_: nudging.schema.create_context_removal_input_schema
    images_description: |
      List of image bytes: [first, second]
    metadata_description: |
      Additional context about the images
  output_schema:
    _target_: nudging.schema.create_context_removal_output_schema
    editing_instruction_description: |
      A focused image editing instruction to remove identified elements.
      Should be specific about what to remove while preserving the core item.
  api_call: ${llm}

evaluator_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: ${task.evaluation.system_prompt}
  input_schema:
    _target_: nudging.schema.create_evaluator_without_prompt_input_schema
    images_description: |
      List of image bytes: [first, second]
    metadata_description: |
      Additional context about the images
  output_schema:
    _target_: nudging.schema.create_evaluator_output_schema
    choice_description: |
      Your choice: 'first' or 'second'
    choice_options: ['first', 'second']
    reason_description: |
      Concise justification of your decision (1-3 sentences).
  api_call: ${llm}
