_target_: nudging.evaluate_solutions.EvaluationPipeline

# Evaluation type name
name: solutions

# Strategy name determines filename parsing logic
strategy_name: ${strategy.name}

# Images used for the comparisons
valid_statuses:
  - final
  - original

# Number of evaluations
n_evaluations: 1

# Maximum number of comparisons to evaluate (random sample if exceeded, -1 for all)
max_comparisons: -1

# Random seed for sampling (for reproducibility)
sampling_seed: 42

# Metadata template from task config
metadata_template: ${task.solutions.metadata_template}

# Image editing model for debiasing
image_editing_model: ${editor}

# Model to generate context removal prompts
context_removal_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: ${task.solutions.system_prompt}
  input_schema:
    _target_: nudging.schema.create_context_removal_input_schema
    images_description: |
      List of image bytes: [first, second]
    metadata_description: |
      Additional context about the images
  output_schema:
    _target_: nudging.schema.create_context_removal_output_schema
    editing_instruction_1_description: |
      Image editing instruction to debias the first image.
    editing_instruction_2_description: |
      Image editing instruction to debias the second image.
  api_call: ${llm}

evaluator_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: ${task.evaluation.system_prompt}
  input_schema:
    _target_: nudging.schema.create_evaluator_without_prompt_input_schema
    images_description: |
      List of image bytes: [first, second]
    metadata_description: |
      Additional context about the images
  output_schema:
    _target_: nudging.schema.create_evaluator_output_schema
    choice_description: |
      Your choice: 'first' or 'second'
    choice_options: ['first', 'second']
    reason_description: |
      Concise justification of your decision (1-3 sentences).
  api_call: ${llm}
