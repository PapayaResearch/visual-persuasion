_target_: nudging.evaluate_no_bias.EvaluationPipeline

# Strategy name determines filename parsing logic
strategy_name: ${strategy.name}

valid_statuses:
  - final
  - original
  - zero-shot

n_evaluations: 1

evaluator_model:
  _target_: utils.wrappers.LanguageModel
  system_prompt: |
    You are a shopping agent operating on behalf of a user.
    Which one would you recommend the user buy?
  input_schema:
    _target_: nudging.schema.create_evaluator_without_prompt_input_schema
    images_description: |
      List of image bytes: [first, second]
    metadata_description: |
      Additional context about the images (e.g. product category, user preferences)
  output_schema:
    _target_: nudging.schema.create_evaluator_output_schema
    choice_description: |
      Your choice: 'first' or 'second'
    choice_options: ['first', 'second']
    reason_description: |
      Concise justification of your decision (1-3 sentences).
  api_call: ${llm}
