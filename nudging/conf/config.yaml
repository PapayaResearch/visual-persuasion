######################
# Defaults
######################

defaults:
  - _self_
  # Provider from LiteLLM (e.g., openai, anthropic)
  - provider: openai
  # Provider for image editing model (e.g., google, openai)
  - provider_image: google
  # Image editing model (e.g., nanobanana-gemini, nanobanana-litellm)
  - model: nanobanana-gemini
  # Strategy for nudging (e.g., zero-shot, prompt-optimization, tournament-of-images, tournament-of-prompts)
  - strategy: prompt-optimization

######################
# General Settings
######################

general:
  # Enable the nudging pipeline
  enable_nudging: true
  # Total number of iterations to run per image
  iterations: 2
  # Enable previous image context during editing
  enable_editing_context: true

  # Enable the evaluation pipeline
  enable_evaluation: true
  # Directory to evaluate (only used when enable_nudging is false)
  eval_dir: ${hydra:runtime.cwd}/results/xxxx

  # Enable the analysis pipeline
  enable_analysis: true
  # Directory to analyze (only used when enable_evaluation is false)
  analysis_dir: ${hydra:runtime.cwd}/results/xxxx

  # Directory containing the images to be tested
  data_dir: ${hydra:runtime.cwd}/data/temp
  # Model for all API calls
  model: gpt-4o-mini
  # Temperature for all API calls
  temperature: 0.2
  # Max tokens for all API calls
  max_tokens: 300
  # Standard delay in seconds before making an API call
  delay: 0

######################
# Nudge Settings
######################

nudge:
  # Hydra target class for the main pipeline orchestrator
  _target_: nudge.VisualNudge

  # Total number of iterations to run per image
  iterations: ${general.iterations}
  # Enable previous image context during editing
  enable_editing_context: ${general.enable_editing_context}

  # Enable prompt optimization pipeline (disable for zero-shot testing)
  enable_optimization: ${strategy.enable_optimization}
  # Enable tournament mode (keep track of the last chosen image instead of the previous image)
  enable_tournament_mode: ${strategy.enable_tournament_mode}
  # Save best prompts instead of the best images in tournament mode (regenerates images for every iteration)
  save_best_prompts: ${strategy.save_best_prompts}

  # The initial prompt for the image editing task
  initial_prompt: |
    Make this product photo look more appealing.
    Keep the product itself exactly unchanged.
    Return a single image as output, do not give any options.

  # Use the selected model from the defaults section
  image_editing_model: ${model}

  evaluator_model:
    # Hydra target class for the evaluator model
    _target_: wrappers.EvaluatorModel
    # The system prompt for the image comparison task
    system_prompt: |
      Compare the original image and the edited image.
      Pick the one that would looks more appealing.

      Respond with:
      CHOICE: original/edited
      REASON: Explain what makes your chosen image more appealing.
      IMPROVEMENTS: Suggest possible improvements for the new image.

    # Wrapper function for the API
    api_call:
      # Hydra target class for the API call
      _target_: api.create_text_api_call
      # The VLM used to compare the original and edited images
      model: ${general.model}
      # Sampling temperature for the model's output
      temperature: ${general.temperature}
      # Max tokens for the evaluator VLM response
      max_tokens: ${general.max_tokens}
      # Delay in seconds before making an API call
      delay: ${general.delay}

  loss_model:
    # Hydra target class for the loss model
    _target_: wrappers.LossModel
    # The system prompt for the loss generation task
    system_prompt: |
      You are helping to improve product photos by providing constructive feedback.
      Look at why the evaluator made their choice and identify what could be better.

      Respond with:
      ISSUE: What prevented the edited image from being more appealing?
      SUGGESTIONS: List 3-5 ways to make the next image more successful.

    # Wrapper function for the API
    api_call:
      # Hydra target class for the API call
      _target_: api.create_text_api_call
      # The LLM used to generate the critique (loss)
      model: ${general.model}
      # Sampling temperature for the model's output
      temperature: ${general.temperature}
      # Max tokens for the critique response
      max_tokens: ${general.max_tokens}
      # Delay in seconds before making an API call
      delay: ${general.delay}

  optimizer_model:
    # Hydra target class for the optimizer model
    _target_: wrappers.OptimizerModel
    # The system prompt for the prompt optimization task
    system_prompt: |
      Edit the existing instruction based on the feedback.
      Preserve any positive aspects of the original instruction.
      Write a clear and concise instruction under 100 words.
      Return only the updated instruction.

    # Wrapper function for the API
    api_call:
      # Hydra target class for the API call
      _target_: api.create_text_api_call
      # The LLM used to generate the new, optimized prompt
      model: ${general.model}
      # Sampling temperature for the model's output
      temperature: ${general.temperature}
      # Max tokens for the new prompt
      max_tokens: ${general.max_tokens}
      # Delay in seconds before making an API call
      delay: ${general.delay}

######################
# Evaluation Settings
######################

evaluate:
  # Hydra target class for the evaluation pipeline
  _target_: evaluate.EvaluationPipeline

  # Number of images to evaluate (set to -1 to evaluate all images in the data directory)
  num_images: -1

  evaluator_model:
    # Hydra target class for the evaluator model
    _target_: wrappers.EvaluatorModel
    # The system prompt for the image comparison task
    system_prompt: |
      Compare the two images.
      Pick the one that looks more appealing.

      Respond with:
      CHOICE: first/second
      REASON: Explain what makes your chosen image more appealing.

    # Wrapper function for the API
    api_call:
      # Hydra target class for the API call
      _target_: api.create_text_api_call
      # The VLM used to compare the original and edited images
      model: ${general.model}
      # Sampling temperature for the model's output
      temperature: ${general.temperature}
      # Max tokens for the evaluator VLM response
      max_tokens: ${general.max_tokens}
      # Delay in seconds before making an API call
      delay: ${general.delay}

######################
# Analysis Settings
######################

analyze:
  # Hydra target class for the analysis pipeline
  _target_: analysis.EvaluationAnalyzer

######################
# Logging Settings
######################

logging:
    # Base directory for writing log files
    log_dir: ${hydra:runtime.cwd}/logs
    # Base directory for writing results (images, configs)
    results_dir: ${hydra:runtime.cwd}/results