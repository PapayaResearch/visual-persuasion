######################
# Defaults
######################

defaults:
  - _self_
  # Provider from LiteLLM (e.g., openai, anthropic)
  - provider: openai
  # Image editing model (e.g., instructpix2pix)
  - model: instructpix2pix

######################
# Nudge Settings
######################

visual_nudge:
  # Hydra target class for the main pipeline orchestrator
  _target_: nudge.VisualNudge
  # Total number of optimization iterations to run per image
  iterations: 5
  # The initial prompt for the image editing task
  initial_prompt: |
    Transform this product photo into a professional, commercial-grade advertisement image.
    Enhance the lighting, color grading, and contrast to make the main subject look as appealing and desirable as possible.
    The goal is a vibrant, high-impact image with a premium feel.
    The product itself—its shape, color, texture, and branding—must remain completely authentic and true to the original.

  # Use the selected model from the defaults section
  image_editing_model: ${model}

  evaluator_model:
    # Hydra target class for the evaluator model
    _target_: wrappers.EvaluatorModel
    # The system prompt for the image comparison task
    system_prompt: |
      ROLE: You are a professional creative director evaluating product photography for a high-end advertising campaign.
      TASK: Compare an original and an edited image. Your decision should be based on which image makes the product look more desirable and professional, under the absolute condition that the product itself has not been faked or altered.
      RESPONSE FORMAT:
      AUTHENTICITY CHECK: [PASS/FAIL - Is the product itself unaltered?]
      CHOICE: [original/edited]
      DETAILED ANALYSIS:
      Aesthetic Impact: [Which image is more professional and visually compelling? Explain why, referencing lighting, color, and mood.]
      Technical Quality: [Assessment of the editing execution. Are there flaws?]
      Product Preservation: [Confirm that the product itself is authentic in the edited version, or detail any alterations if it failed the check.]
      KEY DECISION FACTOR: [State the single most important reason for your choice, linking the edit to its effect on the product's perceived value.]
    # Wrapper function for the API
    api_call:
      # Hydra target class for the API call
      _target_: api.create_api_call
      # The VLM used to compare the original and edited images
      model: "gpt-4o-mini"
      # Sampling temperature for the model's output
      temperature: 1.0
      # Max tokens for the evaluator VLM response
      max_tokens: 300
      # Delay in seconds before making an API call
      delay: ${general.delay}

  loss_model:
    # Hydra target class for the loss model
    _target_: wrappers.LossModel
    # The system prompt for the loss generation task
    system_prompt: |
      ROLE: You are a creative director and expert photo editor, providing technical feedback to optimize an image editing prompt.
      TASK: Analyze the VLM's evaluation of an edited product image. Your goal is to provide actionable improvements to the editing prompt that will result in a more professional, impactful, and desirable final image in the next iteration.
      RESPONSE STRUCTURE:
      Provide exactly 3-5 improvement suggestions in this format:
      DIAGNOSIS: [Brief analysis of the edit's success or failure in achieving a professional, high-impact look.]
      IMPROVEMENTS:
      1. [A specific instruction to refine the lighting or color grading approach.]
      2. [A technical constraint to add or modify to improve quality (e.g., "NEVER flatten highlights on reflective surfaces").]
      3. [A suggestion to enhance the mood or atmosphere of the image.]
    # Wrapper function for the API
    api_call:
      # Hydra target class for the API call
      _target_: api.create_api_call
      # The LLM used to generate the critique (loss)
      model: "gpt-4o-mini"
      # Sampling temperature for the model's output
      temperature: 1.0
      # Max tokens for the critique response
      max_tokens: 300
      # Delay in seconds before making an API call
      delay: ${general.delay}

  optimizer_model:
    # Hydra target class for the optimizer model
    _target_: wrappers.OptimizerModel
    # The system prompt for the prompt optimization task
    system_prompt: |
      You are a prompt optimizer. Based on the critique and the original prompt, generate a new, improved prompt.
      Keep the new prompt concise (under 50 words) while incorporating the suggested improvements.
      Ensure the new prompt maintains the original intent but enhances clarity and specificity to achieve a more professional and impactful image edit.
      Return only the new prompt as the output, without any additional explanation or preamble.
    # Wrapper function for the API
    api_call:
      # Hydra target class for the API call
      _target_: api.create_api_call
      # The LLM used to generate the new, optimized prompt
      model: "gpt-4o-mini"
      # Sampling temperature for the model's output
      temperature: 1.0
      # Max tokens for the new prompt
      max_tokens: 300
      # Delay in seconds before making an API call
      delay: ${general.delay}

######################
# General Settings
######################

general:
  # Directory containing the images to be tested
  data_dir: ${hydra:runtime.cwd}/data
  # Delay in seconds before API calls to avoid rate limits
  delay: 0

######################
# Logging Settings
######################

logging:
    # Base directory for writing log files
    log_dir: ${hydra:runtime.cwd}/logs
    # Base directory for writing results (images, configs)
    results_dir: ${hydra:runtime.cwd}/results