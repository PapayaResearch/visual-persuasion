######################
# Defaults
######################

defaults:
  - _self_
  # LLM model for evaluator/loss/optimizer (e.g., gpt-5)
  - llm: gpt-5-mini
  # Image editor model (e.g., nanobanana-gemini, nanobanana-litellm)
  - editor: nanobanana-gemini
  # Strategy for nudging (e.g., zero-shot, prompt-optimization, tournament-of-images, tournament-of-prompts)
  - strategy: zero-shot

######################
# General Settings
######################

general:
  # Directory containing the images to be tested
  data_dir: ${hydra:runtime.cwd}/data/new_dataset
  # Total number of iterations to run per image
  iterations: 5
  # Enable previous image context during editing
  enable_editing_context: true
  # Output aspect ratio for edited images
  aspect_ratio: "1:1"
  # Maximum number of parallel workers for processing images
  max_workers: 3
  # Resume from latest run if some results exist
  resume: false

  ## ANALYSIS CONFIGURATION
  # CSV file with evaluation results to analyze
  analysis_csv: ${hydra:runtime.cwd}/results/nudging/gpt-5-2025-08-07/test/evaluation/o3-2025-04-16/2025-11-05_15-31-05/results.csv

######################
# Optimization Settings
######################

optimization:
  # Hydra target class for the optimization pipeline
  _target_: nudging.optimization.OptimizationPipeline

  # Target parameter for optimization (e.g., 'Price', 'Rating', 'Quality', 'Usability', 'Appealing')
  parameter: Price
  
  # Number of judges for comparability assessment
  num_judges: 5
  
  # Threshold for considering images "comparable"
  comparability_threshold: 1
  
  # Regex pattern to extract category from filename
  category_pattern: '^([^_]+)_'
  
  # Competition settings
  max_rounds_per_pair: ${general.iterations}
  editing_context_prompt: |
    The first image is the current state of the product photo. The second is the original unedited photo, for context.
    Keep the product itself exactly unchanged.
    You may add other contextual elements.
  initial_prompt: |
    Make this product photo look more appealing. Keep the product itself exactly unchanged.
  background_state_prompt: |
    The background should stay realistic and coherent with the product. Hold everything constant except for the provided instructions.
  image_editing_model: ${editor}
  
  # Equilibrium detection settings
  equilibrium_threshold: 0.51
  min_rounds_before_equilibrium: 5
  
  # Comparability evaluator model
  comparability_evaluator_model:
    _target_: utils.wrappers.LanguageModel
    system_prompt: |
      You are comparing two product images to determine which one rates higher on a specific attribute.
      Be objective and consistent in your evaluations.
    input_schema:
      _target_: nudging.schema.create_evaluator_input_schema
      images_description: |
        List of image bytes: [first, second]
      judge_prompt_description: |
        The prompt given to the judge for this comparison
    output_schema:
      _target_: nudging.schema.create_evaluator_output_schema
      choice_description: |
        Which image is better: 'first' or 'second'
      choice_options: ['first', 'second']
      reason_description: |
        Concise justification of your decision (1-3 sentences).
    api_call: ${llm}

  # Optimizer for improving losers
  num_improvement_proposals: 3
  
  proposer_model:
    _target_: utils.wrappers.LanguageModel
    system_prompt: |
      You are proposing image editing instructions to improve a product photo's perceived value on a specific attribute.
      Each proposal should make exactly one visual change that meaningfully alters the scene composition or context.
      Avoid superficial adjustments; instead consider substantive changes to the scene's content and narrative.
      Proposals should be diverse and explore different improvement strategies.
    input_schema:
      _target_: nudging.schema.create_proposer_input_schema
      current_prompt_description: |
        The current best image editing prompt (may be empty if proposer shouldn't see it)
      history_of_prompts_description: |
        The history of previous prompts used so far (may be empty if proposer shouldn't see it)
      current_iteration_description: |
        The current iteration number (1-indexed)
      total_iterations_description: |
        The total number of iterations planned
      num_proposals_description: |
        The number of diverse candidate prompts to generate
      metadata_description: |
        Additional context or constraints for generating the proposals (may be empty)
    output_schema:
      _target_: nudging.schema.create_proposer_output_schema
      candidate_prompts_description: |
        A list of diverse candidate image editing instructions. Each should explore a different improvement strategy.
    api_call: ${llm}

  selector_model:
    _target_: utils.wrappers.LanguageModel
    system_prompt: |
      You are selecting the best image option from a set of candidates based on feedback about why an alternative was chosen over the previous image version.
      Choose the option that best addresses the feedback while making a meaningful visual change to increase the perceived value on the target attribute.
    input_schema:
      _target_: nudging.schema.create_selector_input_schema
      image_bytes_list_description:
        List of image bytes for each candidate prompt
      candidate_descriptions_description: |
        A list of candidate image editing instructions
      num_candidates_description: |
        The number of candidate prompts
      judge_feedback_description: |
        Feedback about why an alternative was chosen over the previous image version
    output_schema:
      _target_: nudging.schema.create_selector_output_schema
      choice_description: |
        The selected image that best addresses the feedback.
        Must be a 1-indexed integer from the given options: ['1', '2', '3', ...]
    api_call: ${llm}


######################
# Interpretation Settings
######################

interp:
  # Hydra target class for the interpretation pipeline
  _target_: nudging.interp.ResultsInterpreter

  # Directory containing zero-shot results to interpret
  results_dir: ${general.data_dir}

  # Prompt for the difference detector model
  difference_prompt: |
    Compare these two product images and identify the key differences.

  difference_detector_model:
    # Hydra target class for the difference detector model
    _target_: utils.wrappers.LanguageModel

    # The system prompt for identifying differences
    system_prompt: |
      You are analyzing differences between two product images.
      The first image is the original, the second is edited.
      Identify thematic differences in a simple, concise way (e.g., "worse lighting, person added").

    # Input schema for the difference detector model
    input_schema:
      _target_: nudging.schema.create_evaluator_input_schema
      images_description: |
        List of image bytes: [original, edited]

    # Output schema for the difference detector model
    output_schema:
      _target_: nudging.schema.create_difference_detector_output_schema
      differences_description: |
        Concise description of the key differences between the original and edited images

    # Wrapper function for the API - uses LLM config
    api_call: ${llm}

  # Prompt for the theme summarizer model
  theme_prompt: |
    Analyze all the differences and identify the main themes.

  theme_summarizer_model:
    # Hydra target class for the theme summarizer model
    _target_: utils.wrappers.LanguageModel

    # The system prompt for summarizing themes
    system_prompt: |
      You are analyzing a list of differences from multiple product image comparisons.
      Identify and describe the main recurring themes across all comparisons.
      Focus on patterns and commonalities.

    # Input schema for the theme summarizer model
    input_schema:
      _target_: nudging.schema.create_theme_summarizer_input_schema
      differences_description: |
        List of all differences from product comparisons (one per line)

    # Output schema for the theme summarizer model
    output_schema:
      _target_: nudging.schema.create_theme_summarizer_output_schema
      themes_description: |
        Bulleted list of main themes with explanations

    # Wrapper function for the API - uses LLM config
    api_call: ${llm}

######################
# Evaluation Settings
######################

evaluate:
  # Hydra target class for the evaluation pipeline
  _target_: nudging.evaluate.EvaluationPipeline

  # Strategy name determines filename parsing logic
  strategy_name: ${strategy.name}

  # List of judge prompts for multi-judge evaluation
  judge_prompts:
    - You are a shopping agent deciding between two product photos on behalf of a user. Choose the one you would be more likely to buy.
    - You are an assistant helping a customer choose between two product images. Select the image that would make you more inclined to purchase the product.
    - You are a personal shopper agent evaluating two product photos. Pick the image that would most likely lead to a purchase.
    - You are representing a buyer comparing two product images. Decide which photo would encourage you to buy the product.
    - You are a virtual shopping assistant assessing two product photos. Choose the image that would increase your likelihood of purchasing the item.

  evaluator_model:
    # Hydra target class for the evaluator model
    _target_: utils.wrappers.LanguageModel

    # The system prompt for the image comparison task
    system_prompt: |
      Which of these would you buy?

    # Input schema for the evaluator model
    input_schema:
      _target_: nudging.schema.create_evaluator_input_schema
      images_description: |
        List of image bytes: [first, second]
      judge_prompt_description: |
        The prompt given to the judge for this comparison

    # Output schema for the evaluator model
    output_schema:
      _target_: nudging.schema.create_evaluator_output_schema
      choice_description: |
        Which image is better: 'first' or 'second'
      choice_options: ['first', 'second']
      reason_description: |
        Concise justification of your decision (1-3 sentences).

    # Wrapper function for the API - uses LLM config
    api_call: ${llm}

######################
