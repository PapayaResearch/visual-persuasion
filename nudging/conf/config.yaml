######################
# Evaluation Settings
######################

evaluate:
  # Hydra target class for the evaluation pipeline
  _target_: nudging.evaluate.EvaluationPipeline

  # Prompt for the evaluator model
  evaluator_prompt: |
    Compare the two images.

  evaluator_model:
    # Hydra target class for the evaluator model
    _target_: utils.wrappers.LanguageModel

    # The system prompt for the image comparison task
    system_prompt: |
      You are comparing two images to determine which is better.

    # Input schema for the evaluator model
    input_schema:
      _target_: nudging.schema.create_evaluator_input_schema
      task_description: |
        The image comparison task description
      images_description: |
        List of image bytes: [first, second]

    # Output schema for the evaluator model
    output_schema:
      _target_: nudging.schema.create_evaluator_output_schema
      choice_description: |
        Which image is better: 'first' or 'second'
      choice_options: ['first', 'second']
      reason_description: |
        Detailed explanation of why the chosen image is more appealing

    # Wrapper function for the API - uses LLM config
    api_call: ${llm}
    # Enable returning usage data from the API
    return_usage_data: true

  # Whether to allow comparisons between the same image IDs
  allow_same_image_comparison: ${general.allow_same_image_comparison}
  # Whether to only allow comparisons between the same image IDs
  only_allow_same_image_comparison: ${general.only_allow_same_image_comparison}
  # Whether to only allow comparisons between the first and last iterations
  only_allow_first_last_comparison: ${general.only_allow_first_last_comparison}

######################
# Analysis Settings
######################

analyze:
  # Hydra target class for the analysis pipeline
  _target_: nudging.analyze.EvaluationAnalyzer
  # Number of preview images to generate (-1 for all)
  num_previews: -1

######################
# Logging Settings
######################

logging:
    # Base directory for writing log files
    log_dir: ${hydra:runtime.cwd}/logs
    # Base directory for writing results (images, configs)
    results_dir: ${hydra:runtime.cwd}/results
    # Also log to console
    console: true
