######################
# Defaults
######################

defaults:
  - _self_
  # Provider from LiteLLM (e.g., openai, anthropic)
  - provider: openai
  # Image editing model (e.g., nanobanana, instructpix2pix)
  - model: nanobanana

######################
# Nudge Settings
######################

visual_nudge:
  # Hydra target class for the main pipeline orchestrator
  _target_: nudge.VisualNudge

  # Enable prompt optimization pipeline (disable for zero-shot testing)
  enable_optimization: false

  # Total number of iterations to run per image
  iterations: 5
  # The initial prompt for the image editing task
  initial_prompt: |
    Make this product photo look more professional and appealing for advertisement use.
    Keep the product itself exactly unchanged - same shape, same features, same identity.
    Find creative ways to make it more attractive to potential buyers.

  # Use the selected model from the defaults section
  image_editing_model: ${model}

  evaluator_model:
    # Hydra target class for the evaluator model
    _target_: wrappers.EvaluatorModel
    # The system prompt for the image comparison task
    system_prompt: |
      You are deciding which image would sell a product better.
      Compare the original and edited images. Pick the one that looks more appealing to customers.
      The product must be identical in both images - no fake changes allowed.

      Respond with:
      AUTHENTICITY: PASS/FAIL - Is the product unchanged?
      CHOICE: original/edited  
      REASON: Explain what makes your chosen image more appealing to buyers.

    # Wrapper function for the API
    api_call:
      # Hydra target class for the API call
      _target_: api.create_text_api_call
      # The VLM used to compare the original and edited images
      model: "gpt-4o-mini"
      # Sampling temperature for the model's output
      temperature: 1.0
      # Max tokens for the evaluator VLM response
      max_tokens: 300
      # Delay in seconds before making an API call
      delay: ${general.delay}

  loss_model:
    # Hydra target class for the loss model
    _target_: wrappers.LossModel
    # The system prompt for the loss generation task
    system_prompt: |
      Help improve how we make product photos more appealing.
      Look at why the evaluator made their choice and identify what could be better.
      Give specific suggestions for making the product look more attractive to customers.

      Format:
      ISSUE: What prevented the edited image from being more appealing?
      SUGGESTIONS: List 3-5 ways to make the next edit more successful.

    # Wrapper function for the API
    api_call:
      # Hydra target class for the API call
      _target_: api.create_text_api_call
      # The LLM used to generate the critique (loss)
      model: "gpt-4o-mini"
      # Sampling temperature for the model's output
      temperature: 1.0
      # Max tokens for the critique response
      max_tokens: 300
      # Delay in seconds before making an API call
      delay: ${general.delay}

  optimizer_model:
    # Hydra target class for the optimizer model
    _target_: wrappers.OptimizerModel
    # The system prompt for the prompt optimization task
    system_prompt: |
      Create a new editing instruction based on the feedback.
      Focus on making the product more appealing while keeping it authentic.
      Write a clear instruction under 50 words.
      Return only the new instruction.

    # Wrapper function for the API
    api_call:
      # Hydra target class for the API call
      _target_: api.create_text_api_call
      # The LLM used to generate the new, optimized prompt
      model: "gpt-4o-mini"
      # Sampling temperature for the model's output
      temperature: 1.0
      # Max tokens for the new prompt
      max_tokens: 300
      # Delay in seconds before making an API call
      delay: ${general.delay}

######################
# General Settings
######################

general:
  # Directory containing the images to be tested
  data_dir: ${hydra:runtime.cwd}/data
  # Delay in seconds before API calls to avoid rate limits
  delay: 0

######################
# Logging Settings
######################

logging:
    # Base directory for writing log files
    log_dir: ${hydra:runtime.cwd}/logs
    # Base directory for writing results (images, configs)
    results_dir: ${hydra:runtime.cwd}/results