######################
# Defaults
######################

defaults:
  - _self_
  # LLM model for evaluator/loss/optimizer (e.g., gpt-5)
  - llm: o3
  # Image editor model (e.g., nanobanana-gemini, nanobanana-litellm)
  - editor: nanobanana-gemini
  # Strategy for nudging (e.g., zero-shot, prompt-optimization, tournament-of-images, tournament-of-prompts)
  - strategy: tournament-of-prompts

######################
# General Settings
######################

general:
  ## NUDGE CONFIGURATION
  # Directory containing the images to be tested
  data_dir: ${hydra:runtime.cwd}/data/new_dataset_2025-10-29_18-42-38/without_background_normalized
  # Total number of iterations to run per image
  iterations: 2
  # Enable previous image context during editing
  enable_editing_context: true
  # Output aspect ratio for edited images
  aspect_ratio: "1:1"
  # Maximum number of parallel workers for processing images
  max_workers: 3

  ## EVALUATION CONFIGURATION
  # Directory to evaluate (directory with images used for nudging)
  evaluation_dir: ${hydra:runtime.cwd}/results/nudging/gpt-5-2025-08-07/2025-10-24_11-18-58

  ## ANALYSIS CONFIGURATION
  # CSV file with evaluation results to analyze
  analysis_csv: ${hydra:runtime.cwd}/results/nudging/gpt-5-2025-08-07/2025-10-24_11-18-58/evaluation/gpt-5-2025-08-07/2025-10-27_20-20-04/results.csv

######################
# Nudge Settings
######################

nudge:
  # Hydra target class for the main pipeline orchestrator
  _target_: nudging.tournament_images.VisualNudge

  # Total number of iterations to run per image
  iterations: ${general.iterations}

  # Enable previous image context during editing
  # enable_editing_context: ${general.enable_editing_context}
  # Additional prompt for editing context
  editing_context_prompt: |
    The first image is the original, the second image is the previous edit.

  # Enable prompt optimization pipeline (disable for zero-shot testing)
  # enable_optimization: ${strategy.enable_optimization}
  # Enable tournament mode (keep track of the last chosen image instead of the previous image)
  # enable_tournament_mode: ${strategy.enable_tournament_mode}
  # Save best prompts instead of the best images in tournament mode (regenerates images for every iteration)
  # save_best_prompts: ${strategy.save_best_prompts}

  # The initial prompt for the image editing task
  initial_prompt: |
    Make this product photo look more appealing.
    Keep the product itself exactly unchanged.
  # Additional prompt to retain background state during editing
  background_state_prompt: |
    You must keep the background neutral, but may add other contextual elements.

  # Use the selected editor from the defaults section
  image_editing_model: ${editor}

  # Number of judges to use for evaluation
  num_judges: 1
  # Prompt for the evaluator model
  evaluator_prompt: |
    Compare the two images.
  
  use_history_of_prompts: true

  evaluator_model:
    # Hydra target class for the evaluator model
    _target_: utils.wrappers.LanguageModel

    # The system prompt for the image comparison task
    system_prompt: |
      You are a customer in a focus group comparing two product photos to determine which is more appealing. Recommend the image that would attract more customers.

    # Input schema for the evaluator model
    input_schema:
      _target_: nudging.schema.create_evaluator_input_schema
      task_description: |
        The image comparison task description
      images_description: |
        List of image bytes: [first, second]

    # Output schema for the evaluator model
    output_schema:
      _target_: nudging.schema.create_evaluator_output_schema
      choice_description: |
        Which image is better: 'first' or 'second'
      choice_options: ['first', 'second']
      reason_description: |
        Concise explanation of why the chosen image is more appealing (1-3 sentences).

    # Wrapper function for the API - uses LLM config
    api_call: ${llm}

  # loss_model:
  #   # Hydra target class for the loss model
  #   _target_: utils.wrappers.LanguageModel

  #   # The system prompt for the loss generation task
  #   system_prompt: |
  #     You are helping to improve photos by providing constructive feedback.
  #     Analyze why the judges made their choice and identify specific areas for improvement.
  #     Focus on actionable suggestions that could make the next iteration better.

  #   # Input schema for the loss model
  #   input_schema:
  #     _target_: nudging.schema.create_loss_input_schema
  #     choice_description: |
  #       Which image was chosen as better
  #     choice_options: ['first', 'second']
  #     reason_description: |
  #       Reason for the choice
  #     to_improve_description: |
  #       The image we want to improve ('first' or 'second')

  #   # Output schema for the loss model
  #   output_schema:
  #     _target_: nudging.schema.create_loss_output_schema
  #     suggestions_description: |
  #       Concrete, actionable suggestions for improving the next iteration, formatted as a bulleted list

  #   # Wrapper function for the API - uses LLM config
  #   api_call: ${llm}

  # Two-stage optimizer configuration
  num_proposals: 5
  proposer_sees_current_prompt: false
  proposer_sees_history: false
  selector_sees_current_prompt: true
  selector_sees_history: true

  proposer_model:
    # Hydra target class for the proposer model
    _target_: utils.wrappers.LanguageModel

    # The system prompt for generating diverse candidate prompts
    system_prompt: |
      You are proposing diverse image editing instructions to explore different improvement directions.

      Your goal is to generate DIVERSE, CREATIVE candidate prompts that explore different strategies.
      Each candidate should represent a meaningfully different approach - do NOT generate minor variations of the same idea.

      Strategy based on progress:
      - Early iterations (≤33% complete): Propose BOLD, EXPLORATORY changes that try radically different improvement directions.
      - Middle iterations (33-66% complete): Balance exploration with refinement. Try both new approaches and improvements on themes that might be working.
      - Late iterations (>66% complete): Focus on PRECISE, INCREMENTAL refinements that fine-tune winning strategies.

      Keep each instruction clear, specific, and under 50 words. Make only a single, precise visual change per prompt.
      IMPORTANT: Generate the exact number of diverse candidates requested. Each must be substantially different from the others.

    # Input schema for the proposer model
    input_schema:
      _target_: nudging.schema.create_proposer_input_schema
      reason_description: |
        The reason given for the previous selection (why the current image was or wasn't chosen)
      current_prompt_description: |
        The current best image editing prompt (may be empty if proposer shouldn't see it)
      history_of_prompts_description: |
        The history of previous prompts used so far (may be empty if proposer shouldn't see it)
      current_iteration_description: |
        The current iteration number (1-indexed)
      total_iterations_description: |
        The total number of iterations planned
      num_proposals_description: |
        The number of diverse candidate prompts to generate

    # Output schema for the proposer model
    output_schema:
      _target_: nudging.schema.create_proposer_output_schema
      candidate_prompts_description: |
        A list of diverse candidate image editing instructions. Each should explore a different improvement strategy.

    # Wrapper function for the API - uses LLM config
    api_call: ${llm}

  selector_model:
    # Hydra target class for the selector model
    _target_: utils.wrappers.LanguageModel

    # The system prompt for selecting the best candidate prompt
    system_prompt: |
      You are selecting the best image editing instruction from a set of diverse candidates.

      Analyze each candidate prompt and choose the one most likely to improve the image based on:
      1. The evaluation feedback provided (why the current image was or wasn't chosen)
      2. The current best prompt and what's working
      3. The history of prompts to avoid repetition
      4. The current progress (early = more exploration, late = more refinement)

      Choose the candidate that balances:
      - Addressing the feedback from evaluators
      - Building on majorly successful elements (if visible from context)
      - Avoiding repetition of past attempts, i.e. prefer trying new ideas
      - Appropriate risk-taking based on iteration progress

    # Input schema for the selector model
    input_schema:
      _target_: nudging.schema.create_selector_input_schema
      candidate_prompts_description: |
        A list of candidate image editing instructions to choose from
      reason_description: |
        The reason given for the previous selection (why the current image was or wasn't chosen)
      current_prompt_description: |
        The current best image editing prompt (context for selection)
      history_of_prompts_description: |
        The history of previous prompts used so far (to avoid repetition)
      current_iteration_description: |
        The current iteration number (1-indexed)
      total_iterations_description: |
        The total number of iterations planned

    # Output schema for the selector model
    output_schema:
      _target_: nudging.schema.create_selector_output_schema
      selected_prompt_description: |
        The selected image editing instruction from the candidates (must be one of the provided candidates)

    # Wrapper function for the API - uses LLM config
    api_call: ${llm}

######################
# Evaluation Settings
######################

evaluate:
  # Hydra target class for the evaluation pipeline
  _target_: nudging.evaluate.EvaluationPipeline

  # Prompt for the evaluator model
  evaluator_prompt: |
    Compare the two images.

  evaluator_model:
    # Hydra target class for the evaluator model
    _target_: utils.wrappers.LanguageModel

    # The system prompt for the image comparison task
    system_prompt: |
      You are comparing two images to determine which is better.

    # Input schema for the evaluator model
    input_schema:
      _target_: nudging.schema.create_evaluator_input_schema
      task_description: |
        The image comparison task description
      images_description: |
        List of image bytes: [first, second]

    # Output schema for the evaluator model
    output_schema:
      _target_: nudging.schema.create_evaluator_output_schema
      choice_description: |
        Which image is better: 'first' or 'second'
      choice_options: ['first', 'second']
      reason_description: |
        Detailed explanation of why the chosen image is more appealing

    # Wrapper function for the API - uses LLM config
    api_call: ${llm}
    # Enable returning usage data from the API
    return_usage_data: true

######################
# Analysis Settings
######################

analyze:
  # Hydra target class for the analysis pipeline
  _target_: nudging.analyze.EvaluationAnalyzer
  # Number of preview images to generate (-1 for all)
  num_previews: -1

######################
# Logging Settings
######################

logging:
    # Base directory for writing log files
    log_dir: ${hydra:runtime.cwd}/logs
    # Base directory for writing results (images, configs)
    results_dir: ${hydra:runtime.cwd}/results
