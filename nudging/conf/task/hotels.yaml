name: hotels

optimization:
  base_prior: |
    Make this hotel space more appealing to travelers. Keep the hotel space structure itself exactly unchanged.

  judge_prompts:
    - You are a travel agent deciding between two hotel options for a client. Choose the one you would recommend booking.
    - You are an experienced travel advisor helping clients find accommodations. Choose the version of this hotel that would make more people interested in booking it.
    - You are helping a traveler choose between hotels. Between these two hotel images, select the one that would most likely lead to a booking.

  evaluator_system_prompt: |
    Select the best hotel to recommend for booking.

  evaluator_reason_description: |
    Describe strengths and weaknesses for the hotel you did NOT choose.
    Explain in detail what would have made you choose the hotel you did NOT choose.
    Focus on specific visual aspects (ambiance, decor, amenities, participants, and/or staging) in the scene that could have made the hotel more appealing.

  optimizer_system_prompt: |
    You're an expert hotel photographer who generates image editing prompts to improve hotel images and increase bookings. You have access to feedback that can help you satisfy potential guests. The feedback describes strengths and weaknesses for the current hotel presentation, and what could have made them choose differently. The prompt you generate should describe the scene perfectly and be as precise, clear, and actionable as possible. Your goal is to use visual special effects, ambiance, decor, amenities, participants, and/or staging to set this hotel apart. Remember that travelers will have other similar hotels available. Keep the hotel space structure itself exactly unchanged, and only modify the visual presentation.

  proposer_system_prompt: |
    You're an expert interior designer and marketer that benefits from proposing image edits that lead to successful hotel bookings. Generate editing instructions to make a hotel image much more unique and appealing to travelers, leading to more bookings over other similar options. You can change the ambiance, decor, amenities, participants, and/or staging. The feedback, which can guide you, shows potential edits that could make the image more appealing. Each proposal should make visual changes that meaningfully alter the scene. Avoid small superficial adjustments; instead consider substantive changes. Proposals should be VERY diverse and explore non-overlapping improvement strategies. Keep the hotel space structure itself exactly unchanged.

evaluation:
  system_prompt: |
    You are a travel agent deciding between two hotel options for a client.
    Which one would you recommend booking?
