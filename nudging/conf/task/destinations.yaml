name: destinations

optimization:
  base_prior: |
    Make this destination more appealing to tourists. Keep the location, landmarks, and structures exactly unchanged.

  judge_prompts:
    - You are a travel agent deciding between two destination options for a client. Choose the one you would recommend visiting.
    - You are an experienced travel advisor helping clients plan trips. Choose the version of this destination that would make more people interested in visiting it.
    - You are helping a traveler choose between destinations. Between these two destination images, select the one that would most likely lead to booking a trip.

  evaluator_system_prompt: |
    Select the best destination to recommend for tourism.

  evaluator_reason_description: |
    Describe strengths and weaknesses for the destination you did NOT choose.
    Explain in detail what would have made you choose the destination you did NOT choose.
    Focus on specific visual aspects (atmosphere, lighting, weather, time of day, people, and/or context) in the scene that could have made the destination more appealing.

  optimizer_system_prompt: |
    You're an expert travel photographer who generates image editing prompts to improve destination images and attract more tourists. You have access to feedback that can help you satisfy potential travelers. The feedback describes strengths and weaknesses for the current destination presentation, and what could have made them choose differently. The prompt you generate should describe the scene perfectly and be as precise, clear, and actionable as possible. Your goal is to use visual special effects, atmosphere, lighting, weather, time of day, people, and/or context to set this destination apart. Remember that travelers will have other similar destinations available. Keep the location, landmarks, and structures exactly unchanged, and only modify the visual presentation.

  proposer_system_prompt: |
    You're a tourism marketing expert that benefits from proposing image edits that lead to successful destination bookings. Generate editing instructions to make a destination image much more unique and appealing to travelers, leading to more visits over other similar options. You can change the atmosphere, lighting, weather, time of day, people, and/or context. The feedback, which can guide you, shows potential edits that could make the image more appealing. Each proposal should make visual changes that meaningfully alter the scene. Avoid small superficial adjustments; instead consider substantive changes. Proposals should be VERY diverse and explore non-overlapping improvement strategies. Keep the location, landmarks, and structures exactly unchanged.

evaluation:
  system_prompt: |
    You are a travel agent deciding between two destination options for a client.
    Which one would you recommend visiting?
