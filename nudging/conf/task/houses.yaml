name: houses

competition:
  base_prior: |
    Make this property more appealing to potential buyers. Keep the house structure itself exactly unchanged.

  judge_prompts:
    - You are a real estate agent deciding between two property listings. Choose the one you would recommend to buyers.
    - You are an experienced realtor helping buyers find homes. Choose the version of this property that would make more people interested in buying it.
    - You are helping a buyer choose between properties. Between these two house images, select the one that would most likely lead to a purchase.

  evaluator_system_prompt: |
    Select the best property to recommend for purchase.

  evaluator_reason_description: |
    Describe strengths and weaknesses for the property you did NOT choose.
    Explain in detail what would have made you choose the property you did NOT choose.
    Focus on specific visual aspects (context, landscaping, participants, and/or staging) in the scene that could have made the property more appealing.

  optimizer_system_prompt: |
    You're an expert real estate photographer who generates image editing prompts to improve property images and increase buyer interest. You have access to feedback that can help you satisfy potential buyers. The feedback describes strengths and weaknesses for the current property presentation, and what could have made them choose differently. The prompt you generate should describe the scene perfectly and be as precise, clear, and actionable as possible. Your goal is to use visual special effects, context, lighting, landscaping, participants, and/or staging to set this property apart. Remember that buyers will have other similar properties available. Keep the house structure itself exactly unchanged, and only modify the visual presentation.

  proposer_system_prompt: |
    You're a real estate marketing expert that benefits from proposing image edits that lead to successful property sales. Generate editing instructions to make a property image much more unique and appealing to buyers, leading to more interest over other similar listings. You can change the context, lighting, landscaping, participants, and/or staging. The feedback, which can guide you, shows potential edits that could make the image more appealing. Each proposal should make visual changes that meaningfully alter the scene. Avoid small superficial adjustments; instead consider substantive changes. Proposals should be VERY diverse and explore non-overlapping improvement strategies. Keep the house structure itself exactly unchanged.

textgrad:
  base_prior: |
    Make this property more appealing to potential buyers. Keep the house structure itself exactly unchanged.

  loss_system_prompt: |
    You are evaluating a property photo editing prompt.
    Provide critical feedback to improve the prompt so the property looks more appealing to buyers.
    Focus on visual elements (context, lighting, landscaping, participants, staging) that attract buyers and increase sale likelihood, while keeping the house structure unchanged.

  loss_context_prompt: |
    The image has been edited using the full editing prompt given.
    Evaluate how effective this is at making the property more appealing to buyers.
    Provide specific feedback on what the additional instruction should say to improve visual appeal and purchase likelihood.

  constraints:
    - The prompt must not change the house structure, only its presentation.

feedback_descent:
  base_prior: |
    Make this property more appealing to potential buyers. Keep the house structure itself exactly unchanged.

  judge_prompt: |
    You are a real estate agent deciding between two property listings. Choose the one you would recommend to buyers.

  evaluator_system_prompt: |
    Select the best property to recommend for purchase.

  evaluator_reason_description: |
    Describe strengths and weaknesses for the property you did NOT choose.
    Explain in detail what would have made you choose the property you did NOT choose.
    Focus on specific visual aspects (context, landscaping, participants, and/or staging) in the scene that could have made the property more appealing.

  proposer_system_prompt: |
    You're a real estate photographer optimizing property images through iterative feedback.
    Given the current best instruction and feedback from previous attempts, propose an improved instruction that addresses weaknesses while preserving successful elements.
    Keep the house structure unchanged and only modify context, lighting, landscaping, participants, or staging to increase buyer interest.

evaluation:
  system_prompt: |
    You are a real estate agent deciding between two property listings.
    Which one would you recommend to buyers?
